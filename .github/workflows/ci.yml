name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  node-services-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - backend/services/user-service
          - backend/services/finance-service
          - backend/services/notification-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

  ml-service-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/ml-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/services/ml-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate import
        run: python -c "import app.main; print('ml-service import ok')"

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose (dev)
        run: docker compose -f infrastructure/docker/docker-compose.yml config > /dev/null

      - name: Validate compose (prod)
        run: docker compose -f infrastructure/docker/docker-compose.prod.yml config > /dev/null
