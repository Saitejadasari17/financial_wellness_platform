services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - user-service
      - finance-service
      - ml-service
      - notification-service
    networks:
      - app-network

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost
    networks:
      - app-network

  user-service:
    build:
      context: ../../backend/services/user-service
      dockerfile: Dockerfile
    environment:
      PORT: 8000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/financial_wellness
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-this-secret
      INIT_DB_SCHEMA: "true"
      ALLOWED_ORIGINS: http://localhost,http://localhost:3000
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    networks:
      - app-network

  finance-service:
    build:
      context: ../../backend/services/finance-service
      dockerfile: Dockerfile
    environment:
      PORT: 8001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/financial_wellness
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-this-secret
      INIT_DB_SCHEMA: "true"
      ALLOWED_ORIGINS: http://localhost,http://localhost:3000
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: financial_wellness_logs
    depends_on:
      - postgres
      - redis
      - mongo
    ports:
      - "8001:8001"
    networks:
      - app-network

  ml-service:
    build:
      context: ../../backend/services/ml-service
      dockerfile: Dockerfile
    environment:
      PORT: 8002
      DB_URL: postgres://postgres:postgres@postgres:5432/financial_wellness
      REDIS_URL: redis://redis:6379
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  notification-service:
    build:
      context: ../../backend/services/notification-service
      dockerfile: Dockerfile
    environment:
      PORT: 8003
      REDIS_URL: redis://redis:6379
      NOTIFICATION_QUEUE: notification_queue
    ports:
      - "8003:8003"
    depends_on:
      - redis
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financial_wellness
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongo_data:
